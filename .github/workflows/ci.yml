name: Model CI Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    
  workflow_dispatch:

concurrency:
    group: model-ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      model_changed: ${{ steps.filter.outputs.model }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect model-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            model:
              - 'src/data_preprocessing/**'
              - 'src/model_training/**'
              - 'src/evaluate.py'
              - 'src/run_pipeline.py'
              - 'config.yaml'
              - '.github/workflows/ci.yml'
              - 'data/**' 
              # not sure, we could add/remove (we should determine what counts as model improvement)


  quality-checks:
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - name: checkout repository
        uses: actions/checkout@v5
      
      - name: set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      
      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: run linting
        run: |
          ruff check src tests/

      - name: validate config file
        run: |
          python src/validate_config.py --config config.yaml

      - name: API import smoke test
        run: |
          python - << 'PY'
          from api.main import app 
          assert app.title == "Automated Model Validator Inference API"
          print("API import passed.")
          PY
              
          
      - name: run code tests
        run: |
           pytest -v --cov=src tests/



  model-gate:
    runs-on: ubuntu-latest
    needs: [detect-changes, quality-checks]
    if: needs.detect-changes.outputs.model_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      

      - name: run training and evaluation pipeline
        run: |
          python src/run_pipeline.py --config config.yaml
      
      - name: run CI gate
        run: |
          python src/CI_gate.py --config config.yaml
      
      - name: print summaries
        if: always()
        run: |
          echo "=== Training Summary ==="
          test -f artifacts/training_summary.json && cat artifacts/training_summary.json || true
          echo "=== Evaluation Report ==="
          test -f artifacts/evaluation_report.json && cat artifacts/evaluation_report.json || true

      - name: fail if the auc gate fails
        run: |
          python - << 'PY'
          import json
          import sys
          from pathlib import Path
          report_path = Path("artifacts/evaluation_report.json")
          if not report_path.exists():
              print("Evaluation report not found.")
              sys.exit(1)

          with report_path.open() as f:
              report = json.load(f)

          auc_result = report.get("gates", {}).get("auc", {})

          if auc_result.get("result") != "pass":
              print("AUC gate failed. Failing the CI pipeline.")
              sys.exit(1)

          print(f"AUC gate passed: {auc_result}")
          PY
          
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          retention-days: 30

      # - name: run performance tests
      #   run: |
      #      pytest -v --cov=src tests/


  model-gate-status:
      runs-on: ubuntu-latest
      needs: [detect-changes, model-gate]
      if: always()
      steps:
        - name: Report model gate status
          run: |
            echo "Model changed: ${{ needs.detect-changes.outputs.model_changed }}"
            echo "Model gate result: ${{ needs.model-gate.result }}"

