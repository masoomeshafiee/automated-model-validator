name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    
  workflow_dispatch:

concurrency:
    group: model-ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v5
      
      - name: set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      
      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: run linting
        run: |
          ruff check src test

      - name: validate config file
        run: |
          python src/validate_config.py --config config.yaml

      - name: API import smoke test
        run: |
          python - << 'PY'
          from api.main import app 
          assert app.title == "Automated Model Validator Inference API"
          print("API import passed.")
          PY
              
          
      - name: run code tests
        run: |
           pytest -v --cov=src tests/



  
